name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    # Shell-only governance scripts (no Xcode/Swift build) — run on abundant
    # Linux runners to skip the scarce macOS queue. The test job stays macOS.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency lint
        run: bash scripts/dependency-lint.sh
      - name: Module governance gate
        run: bash scripts/module-governance.sh

  test:
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Fetch Python runtime (usd-core)
        run: bash scripts/fetch-python-runtime.sh
      - name: Test all packages (with coverage)
        env:
          # The real-usd-core corpus + StageSaver save-path tests resolve the
          # interpreter fetched into Resources/Python/runtime. Requiring it here
          # turns "no interpreter" from a silent skip into a hard failure — those
          # tests are what hold USDBridge at its 95% floor, so a skip would drop
          # coverage rather than report a problem.
          USDBRIDGE_REQUIRE_USD: "1"
        run: bash scripts/test-all.sh --coverage
      - name: Per-module coverage gate + deep fuzz corpus
        env:
          # Deepens the committed fuzz-corpus sweep (FuzzCorpus.swift) far
          # beyond the 40-iteration local default (applies to the MeshKit run).
          MESHKIT_FUZZ_ITERATIONS: "400"
        # Data-driven gate over the whole MODULES table in coverage-gate.sh:
        # spec floors (100%/95%) for the logic modules + DesignSystem + CLI +
        # USDBridge, ratchet floors for ViewportKit/EditorUI (raised as their
        # harnesses land — see ROADMAP Phase T). No override label, by design.
        run: bash scripts/coverage-gate.sh

  sculpt-eval:
    # Sculpt-accuracy regression (#93). Runs SculptEvalHarness over the frozen
    # P0 labelled corpus and fails on any drift from the fixtures frozen in
    # EvalRegressionTests.swift — the same metric the live continue-gate uses,
    # so a gate-moving change is caught here first. SculptKit is pure Swift
    # (no usd-core / GPU / imaging), so this needs neither the Python runtime
    # nor the full test matrix and stays fast.
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Sculpt-accuracy regression over the P0 corpus
        run: bash scripts/sculpt-eval-gate.sh

  roundtrip:
    # T1 round-trip invariant layer (ROADMAP Milestone 4). Blocking and
    # red-on-failure: open→save→open must be a fixed point, open→edit→undo-all
    # →save must land back on the opened model, and malformed input must be
    # rejected — asserted over the committed bridge mini-corpus against an
    # expectations table that fails on regression *and* on undeclared progress.
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Fetch Python runtime (usd-core)
        run: bash scripts/fetch-python-runtime.sh
      - name: Round-trip invariants over the bridge mini-corpus
        # fetch-python-runtime.sh installs usd-core into a venv; put it on PATH
        # so the gate's `python3 -c 'import pxr'` probe resolves to it rather
        # than skipping.
        env:
          # A missing usd-core is a local skip but a hard CI failure: a gate
          # that passes when its dependency is absent isn't a gate.
          ROUNDTRIP_REQUIRE_USD: "1"
        run: |
          export PATH="$PWD/Resources/Python/runtime/bin:$PATH"
          bash scripts/roundtrip-gate.sh

  e2e:
    # T11 end-to-end feature-flow layer (specs/e2e-testing.md). Blocking and
    # red-on-failure: whole user journeys driven through the real `openusdz mcp`
    # server (--no-relay, headless) against the real usd-core bridge — author,
    # edit/undo/redo, variants, validation — asserted against an expectations
    # table that fails on regression *and* on undeclared progress.
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Fetch Python runtime (usd-core)
        run: bash scripts/fetch-python-runtime.sh
      - name: E2E feature flows over the MCP seam
        # Same PATH shim as roundtrip so the gate's `import pxr` probe resolves
        # to the bundled runtime rather than skipping.
        env:
          # A missing usd-core is a local skip but a hard CI failure: a gate
          # that passes when its dependency is absent isn't a gate.
          E2E_REQUIRE_USD: "1"
        run: |
          export PATH="$PWD/Resources/Python/runtime/bin:$PATH"
          bash scripts/e2e-gate.sh
