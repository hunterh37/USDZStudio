name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Dependency lint
        run: bash scripts/dependency-lint.sh
      - name: Module governance gate
        run: bash scripts/module-governance.sh

  test:
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Fetch Python runtime (usd-core)
        run: bash scripts/fetch-python-runtime.sh
      - name: Test all packages (with coverage)
        run: bash scripts/test-all.sh --coverage
      - name: MeshKit coverage gate (100% floor) + deep fuzz corpus
        env:
          # Deepens the committed fuzz-corpus sweep (FuzzCorpus.swift) far
          # beyond the 40-iteration local default.
          MESHKIT_FUZZ_ITERATIONS: "400"
        run: bash scripts/coverage-gate.sh
      # Remaining per-module xccov coverage floors (specs/testing.md) are wired
      # in as modules gain measurable surface; tracked in ROADMAP Phase 0.
